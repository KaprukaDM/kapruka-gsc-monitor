services:
  - type: web
    name: kapruka-gsc-monitor
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --timeout 180
    envVars:
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GSC_REFRESH_TOKEN
        sync: false
      - key: GSC_SITE_URL
        value: https://www.kapruka.com
